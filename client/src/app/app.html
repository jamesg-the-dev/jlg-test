<app-loading-bar />
<app-notification-stack />

<div class="flex h-screen overflow-hidden">
  <app-sidebar
    [view]="taskStore.view()"
    [taskCounts]="taskStore.taskCounts()"
    (viewChange)="taskStore.setView($event)"
    (newTask)="taskStore.openNewTask()"
  />

  <main class="flex-1 flex overflow-hidden min-w-0">
    <section class="flex flex-col flex-1 min-w-0 overflow-y-auto transition-all">
      <header class="px-5 md:px-8 pt-7 pb-5">
        <div class="max-w-2xl">
          <div>
            <p class="text-sm text-muted-foreground mt-1">Hi, {{ firstName }}!</p>
            <h1 class="text-2xl md:text-3xl font-bold text-foreground mt-1 mb-5">
              {{ taskStore.viewLabel() }}
            </h1>
          </div>
        </div>
      </header>

      <div class="px-5 md:px-8 pb-28 md:pb-10 max-w-2xl space-y-6">
        @if (taskStore.visibleTasks().length === 0) {
          <app-task-empty-state />
        } @else {
          @for (group of taskStore.groupedTasks(); track group.label) {
            <section>
              @if (taskStore.groupedTasks().length > 1) {
                <h2
                  class="text-xs font-semibold uppercase tracking-widest text-muted-foreground mb-3"
                >
                  {{ group.label }}
                </h2>
              }

              <ul class="space-y-2">
                @for (task of group.items; track task.id) {
                  <li>
                    <app-task-card
                      [task]="task"
                      (completed)="taskStore.toggleTask($event)"
                      (selected)="openTaskDetailDialog($event)"
                      (deleted)="deleteTask($event)"
                    />
                  </li>
                }
              </ul>
            </section>
          }
        }
      </div>
    </section>
  </main>

  <app-bottom-tab-bar [view]="taskStore.view()" (viewChange)="taskStore.setView($event)" />
</div>
