<section class="flex flex-col max-h-[85vh]">
  <div class="shrink-0 flex items-start justify-between gap-4 p-4 pb-0">
    <h2 class="text-lg font-bold text-foreground">New Task</h2>

    <button
      type="button"
      class="p-1.5 rounded-full hover:bg-muted transition-colors flex items-center justify-center"
      aria-label="Close"
      appTooltip="Close"
      (click)="dialogRef.close()"
    >
      <span class="material-symbol symbol-filled" aria-hidden="true">close</span>
    </button>
  </div>

  <form class="flex flex-col gap-5 min-h-0 overflow-y-auto p-4" [formRoot]="taskForm">
    <label
      class="block text-xs font-semibold text-muted-foreground uppercase tracking-wider mb-1.5"
    >
      Task title
      <input
        cdkFocusInitial
        type="text"
        class="w-full mt-1 px-3 py-2.5 rounded-xl text-sm font-medium text-foreground placeholder:text-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-ring transition-all bg-input-background border-none"
        placeholder="What needs to be done?"
        [formField]="taskForm.title"
      />
    </label>

    <div class="grid gap-3 min-[960px]:grid-cols-2">
      <label
        class="block text-xs font-semibold text-muted-foreground uppercase tracking-wider mb-1.5"
      >
        Due date
        <input
          type="date"
          class="w-full mt-1 px-3 py-2.5 rounded-xl text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-ring transition-all bg-input-background border-none"
          [formField]="taskForm.dueDate"
        />
      </label>
    </div>

    <div>
      <span
        id="priority-label"
        class="block text-xs font-semibold text-muted-foreground uppercase tracking-wider mb-2"
      >
        Priority
      </span>

      <div class="flex gap-2" role="radiogroup" aria-labelledby="priority-label">
        @for (priority of priorities; track priority) {
          <label class="flex-1 relative cursor-pointer">
            <input
              type="radio"
              name="priority"
              class="peer sr-only"
              [value]="priority"
              [checked]="taskForm.priority().value() === priority"
              (change)="updatePriority(priority)"
            />

            <span
              aria-hidden="true"
              class="py-2 rounded-xl text-xs font-semibold transition-all duration-150 text-center block peer-focus-visible:ring-2 peer-focus-visible:ring-offset-2 priority-pill"
              [class.selected]="taskForm.priority().value() === priority"
              [style.--priority-color]="priorityConfig[priority].color"
              [style.--priority-bg]="priorityConfig[priority].background"
            >
              {{ priorityConfig[priority].label }}
            </span>
          </label>
        }
      </div>
    </div>

    <label
      class="block text-xs font-semibold text-muted-foreground uppercase tracking-wider mb-1.5"
    >
      Category
      <div class="relative text-base">
        <select
          class="w-full mt-1 appearance-none px-3 py-2.5 rounded-xl text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-ring transition-all pr-8 bg-input-background border-none font-normal"
          [formField]="taskForm.category"
        >
          <option value="" selected disabled hidden>Choose category</option>
          @for (category of categories; track category) {
            <option [value]="category">{{ category }}</option>
          }
        </select>
        <span
          class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground pointer-events-none material-symbol symbol-filled"
          aria-hidden="true"
          >keyboard_arrow_down</span
        >
      </div>
    </label>

    <div class="shrink-0 flex gap-3 pt-1">
      <button
        type="button"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all bg-muted text-muted-foreground active:scale-[0.98]"
        (click)="dialogRef.close()"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all active:scale-[0.98] bg-accent text-white"
        [disabled]="!taskForm.title().value().trim()"
      >
        Save Task
      </button>
    </div>
  </form>
</section>
