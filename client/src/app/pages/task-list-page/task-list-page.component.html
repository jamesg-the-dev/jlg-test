@let tasks = taskStore.tasks();

<section class="flex flex-col flex-1 min-w-0 overflow-y-auto transition-all h-full">
  <header class="px-5 md:px-8 pt-7 pb-5">
    <div class="max-w-2xl">
      <div>
        <p class="text-sm text-muted-foreground mt-1">Hi, {{ firstName }}!</p>
        <h1 class="text-2xl md:text-3xl font-bold text-foreground mt-1 mb-5">
          {{ taskStore.viewLabel() }}
        </h1>
      </div>
    </div>
  </header>

  <section class="px-5 md:px-8 pb-28 md:pb-10 max-w-2xl space-y-6">
    @if (tasks.length === 0) {
      <app-task-empty-state />
    } @else {
      <app-task-list
        [tasks]="tasks"
        (completed)="taskStore.toggleTask($event)"
        (selected)="openTaskDetailDialog($event)"
        (deleted)="deleteTask($event)"
      />
    }
  </section>
</section>
